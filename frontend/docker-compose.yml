services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: plutus-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
