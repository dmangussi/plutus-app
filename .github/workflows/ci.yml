name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm run test
        working-directory: frontend

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

  e2e:
    name: E2E tests
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
            e2e/package-lock.json

      - name: Backend — install
        run: npm ci
        working-directory: backend

      - name: Frontend — install
        run: npm install
        working-directory: frontend

      - name: E2E — install
        run: npm ci
        working-directory: e2e

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Playwright — install system dependencies
        run: npx playwright install-deps chromium
        working-directory: e2e

      - name: Playwright — install browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: e2e

      - name: E2E — run tests
        run: npm test
        working-directory: e2e
        env:
          SUPABASE_URL_TEST:         ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_ANON_KEY_TEST:    ${{ secrets.SUPABASE_ANON_KEY_TEST }}
          SUPABASE_SERVICE_KEY_TEST: ${{ secrets.SUPABASE_SERVICE_KEY_TEST }}
          TEST_USER_EMAIL:           ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD:        ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_ID:              ${{ secrets.TEST_USER_ID }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
